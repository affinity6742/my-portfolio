<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Hero Section -->
    <header class="py-20 text-center bg-white border-b">
        <h1 class="text-4xl font-bold text-gray-800">MD Azizul Islam Shakil</h1>
        <p class="mt-4 text-xl text-gray-600">Social Media Manager & Graphic Designer</p>
    </header>

    <!-- Portfolio Grid -->
    <main class="max-w-6xl mx-auto p-6">
        <h2 class="text-2xl font-bold mb-8">My Recent Work</h2>
        
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- আপনার প্রজেক্টগুলো এখানে অটোমেটিক চলে আসবে -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-10 text-center text-gray-500">
        <p>© 2024 Your Name. Built with ❤️</p>
    </footer>

    <!-- ডাটা ফাইল কানেক্ট করা -->
    <script src="projects.js"></script>
    <script>
        // প্রজেক্টগুলো দেখানোর ম্যাজিক কোড
        const grid = document.getElementById('portfolio-grid');
        projects.forEach(project => {
            const card = `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden transition-transform hover:scale-105">
                    <img src="projects/${project.image}" alt="${project.title}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${project.title}</h3>
                        <p class="text-sm text-gray-500">${project.category}</p>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    </script>
</body>
</html>
