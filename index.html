<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Masonry Grid Layout */
        .portfolio-columns {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .portfolio-columns { column-count: 2; } }
        @media (min-width: 1024px) { .portfolio-columns { column-count: 3; } }
        
        .portfolio-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Header Section -->
    <header class="py-16 text-center bg-white border-b sticky top-0 z-10 shadow-sm">
        <h1 class="text-4xl font-extrabold tracking-tight">Your Name Portfolio</h1>
        <p class="mt-2 text-lg text-blue-600 font-medium">Social Media Manager & Graphic Designer</p>
    </header>

    <!-- Main Portfolio Grid -->
    <main class="max-w-7xl mx-auto p-6 mt-8">
        <div id="portfolio-grid" class="portfolio-columns">
            <!-- Projects will appear here automatically -->
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 border-t mt-12">
        <p>© 2024 Your Name. All Rights Reserved.</p>
    </footer>

    <!-- Connect Data File -->
    <script src="projects.js"></script>
    
    <script>
        window.onload = function() {
            const grid = document.getElementById('portfolio-grid');
            if (typeof projects !== 'undefined') {
                projects.forEach(project => {
                    let mediaHtml = '';
                    
                    // Video Check
                    if (project.image.toLowerCase().endsWith('.mp4')) {
                        mediaHtml = `
                            <video controls class="w-full h-auto rounded-t-xl block">
                                <source src="${project.image}" type="video/mp4">
                            </video>`;
                    } else {
                        // Image - No fixed height, so it won't crop
                        mediaHtml = `
                            <img src="${project.image}" alt="${project.title}" 
                                 class="w-full h-auto block rounded-t-xl hover:opacity-90 transition-opacity"
                                 onerror="this.src='https://via.placeholder.com/400x600?text=Image+Not+Found'">`;
                    }

                    grid.innerHTML += `
                        <div class="portfolio-item bg-white rounded-xl shadow-md hover:shadow-xl transition-shadow border border-gray-100 overflow-hidden">
                            ${mediaHtml}
                            <div class="p-5">
                                <span class="px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-50 rounded-full uppercase tracking-wider">${project.category}</span>
                                <h3 class="font-bold text-xl mt-3 text-gray-800 leading-tight">${project.title}</h3>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p class='text-center'>Please check projects.js file.</p>";
            }
        };
    </script>
</body>
</html>
