<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="py-10 text-center bg-white shadow-sm">
        <h1 class="text-3xl font-bold text-gray-800">My Portfolio</h1>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Projects will appear here -->
        </div>
    </main>

    <!-- Load the project data first -->
    <script src="projects.js"></script>
    
    <!-- Then run the script to show images -->
    <script>
        window.onload = function() {
            const grid = document.getElementById('portfolio-grid');
            if (typeof projects !== 'undefined') {
                projects.forEach(project => {
                    let mediaHtml = '';
                    if (project.image.toLowerCase().endsWith('.mp4')) {
                        mediaHtml = `<video controls class="w-full h-48 object-cover"><source src="${project.image}" type="video/mp4"></video>`;
                    } else {
                        mediaHtml = `<img src="${project.image}" alt="${project.title}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">`;
                    }

                    grid.innerHTML += `
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                            ${mediaHtml}
                            <div class="p-4">
                                <h3 class="font-bold text-lg text-gray-800">${project.title}</h3>
                                <p class="text-sm text-blue-600 font-medium">${project.category}</p>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p class='text-center col-span-full'>Projects not loaded. Check projects.js file.</p>";
            }
        };
    </script>
</body>
</html>
